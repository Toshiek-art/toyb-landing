name: Deploy Preview to Cloudflare Pages

on:
  push:
    branches:
      - "codex/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ vars.CLOUDFLARE_GITHUB_PREVIEW_ENVIRONMENT || 'preview' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Validate Cloudflare preview deploy configuration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PREVIEW_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PREVIEW_PAGES_PROJECT || 'toyb-preview' }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || {
            echo "Missing CLOUDFLARE_API_TOKEN for Cloudflare Pages preview deploy."
            exit 1
          }
          test -n "$CLOUDFLARE_ACCOUNT_ID" || {
            echo "Missing CLOUDFLARE_ACCOUNT_ID for Cloudflare Pages preview deploy."
            exit 1
          }
          test -n "$CLOUDFLARE_PREVIEW_PAGES_PROJECT" || {
            echo "Missing CLOUDFLARE_PREVIEW_PAGES_PROJECT for Cloudflare Pages preview deploy."
            exit 1
          }

      - name: Deploy preview to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ vars.CLOUDFLARE_PREVIEW_PAGES_PROJECT || 'toyb-preview' }}
